name: Release Installer

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        # 关键：禁止 electron-builder 自动发布，确保只产出 release/* 文件供后续步骤上传
        run: npm run dist:win:ci -- --publish=never

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            release/*.exe
            release/*.yml
            release/*.blockmap